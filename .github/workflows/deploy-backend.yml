name: Deploy Backend (Manual Fallback)

# PRIMARY deployment: Railway native GitHub integration watches this repo and
# auto-deploys on every push to main. Set up in Railway dashboard > Service > Settings > Source.
#
# This workflow is a MANUAL FALLBACK only — run it if native integration is ever broken.
# Requires RAILWAY_API_TOKEN secret (generate at railway.app > Account Settings > Tokens).

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy current code to Railway
        run: railway up --service caring-emotion --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 3deeefd3-91c8-4034-b82d-6e30d3287bf3
          RAILWAY_ENVIRONMENT_ID: 3ded8cb6-bcc7-4edb-a81c-4de520f792a9
