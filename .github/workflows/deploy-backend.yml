name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package.json'
      - 'railway.toml'
      - 'Dockerfile'

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Accuracy gate BEFORE deploy — this workflow fires on push to main
      # independently of ci.yml, so gate the deploy itself on the nutrition harness.
      # Deterministic, no secrets, ~1s: a regression here blocks the deploy.
      - name: Install workspace packages
        run: npm install

      - name: Nutrition accuracy harness (deploy gate)
        run: npm run harness:nutrition --workspace=backend

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service caring-emotion --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 3deeefd3-91c8-4034-b82d-6e30d3287bf3
          RAILWAY_ENVIRONMENT_ID: 3ded8cb6-bcc7-4edb-a81c-4de520f792a9
