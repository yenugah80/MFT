name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install all workspace packages
        run: npm install

      # Nutrition accuracy gate — deterministic, no secrets, <1s. Fails the build if
      # the plausibility checker regresses (a false positive on a real dish, or a
      # missed known error). Runs first because it's fast and needs no external services.
      - name: Nutrition accuracy harness
        run: npm run harness:nutrition --workspace=backend

      - name: Run backend tests
        run: npm test --workspace=backend
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

  mobile:
    name: Mobile – Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Install from the workspace root, not `mobile/` — the root postinstall
      # (patch-package) only resolves when npm sees the workspace root, and
      # scoping install to a member directory left it unresolvable (exit 127).
      - name: Install all workspace packages
        run: npm install

      - name: Run tests
        working-directory: mobile
        run: npm test -- --passWithNoTests --watchAll=false

  worker:
    name: Worker – Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install all workspace packages
        run: npm install
