name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Install from the workspace root — worker/package-lock.json is a stale
      # standalone lockfile that drifted out of sync with worker/package.json
      # (missing the worker package itself and its deps), so `npm ci` scoped
      # to worker/ always failed with EUSAGE. The root lockfile is in sync.
      - name: Install all workspace packages
        run: npm ci

      - name: Deploy via Wrangler
        working-directory: worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
